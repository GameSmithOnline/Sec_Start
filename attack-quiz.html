<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATT&CK Quiz</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg-soft: #151b26;
      --panel: #1a2334;
      --text: #dbe8ff;
      --muted: #92a8c7;
      --accent: #45c7ff;
      --accent-soft: rgba(69, 199, 255, 0.2);
      --good: #37d67a;
      --bad: #ff6b6b;
      --border: #2a3a56;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 5%, rgba(69, 199, 255, 0.18), transparent 42%),
        radial-gradient(circle at 90% 100%, rgba(0, 255, 178, 0.12), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .shell {
      width: min(980px, calc(100% - 24px));
      margin: 20px auto;
      background: linear-gradient(160deg, rgba(26, 35, 52, 0.96), rgba(21, 27, 38, 0.96));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .topbar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.18);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    select,
    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      background: var(--bg-soft);
      font-size: 13px;
    }

    button {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    .content {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 1fr));
      gap: 8px;
    }

    .stat {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .stat .k {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat .v {
      font-size: 20px;
      font-weight: 700;
      margin-top: 2px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 14px;
    }

    .qtype {
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .question {
      margin: 0;
      line-height: 1.5;
      font-size: 18px;
    }

    .choices {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .choice {
      text-align: left;
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .choice.correct {
      border-color: rgba(55, 214, 122, 0.7);
      box-shadow: 0 0 0 3px rgba(55, 214, 122, 0.18);
    }

    .choice.incorrect {
      border-color: rgba(255, 107, 107, 0.7);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.18);
    }

    .result {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .result.good { color: var(--good); }
    .result.bad { color: var(--bad); }

    .loading {
      color: var(--muted);
      font-size: 14px;
    }

    .hidden { display: none !important; }

    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2, minmax(100px, 1fr)); }
      .question { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="brand">
        <h1 id="quizTitle">ATT&CK Universal Quiz</h1>
        <p id="quizSubtitle">Load any ATT&CK STIX bundle and start drilling techniques.</p>
      </div>
      <div class="toolbar">
        <select id="datasetSelect" aria-label="Select ATT&CK dataset">
          <option value="enterprise-attack-18.1.json">Enterprise 18.1</option>
          <option value="mobile-attack-18.1.json">Mobile 18.1</option>
          <option value="ics-attack-18.1.json">ICS 18.1</option>
        </select>
        <button id="reloadBtn" type="button">Load Dataset</button>
        <button id="nextBtn" type="button" disabled>Next Question</button>
      </div>
    </section>

    <section class="content">
      <div class="stats">
        <div class="stat"><div class="k">Domain</div><div class="v" id="statDomain">-</div></div>
        <div class="stat"><div class="k">Questions</div><div class="v" id="statQuestions">0</div></div>
        <div class="stat"><div class="k">Correct</div><div class="v" id="statCorrect">0</div></div>
        <div class="stat"><div class="k">Accuracy</div><div class="v" id="statAccuracy">0%</div></div>
      </div>

      <div class="card">
        <div id="loadingText" class="loading">Pick a dataset and click Load Dataset.</div>

        <div id="quizWrap" class="hidden">
          <div id="questionType" class="qtype"></div>
          <p id="questionText" class="question"></p>
          <div id="choices" class="choices"></div>
        </div>
      </div>

      <div id="resultText" class="result"></div>
    </section>
  </main>

  <script src="attack-quiz.js"></script>
</body>
</html>
